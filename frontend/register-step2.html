<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шаг 2: введите данные вашей организации</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <main class="page page--wide">
        <section class="form-container">
            <header class="form-header">
                <a class="back-link" href="register-confirm.html" aria-label="Назад">
                    <img src="images/Vector.svg" alt="" class="back-icon">
                </a>
                <h1 class="form-header-title">Шаг 2: введите данные вашей организации</h1>
            </header>

            <form class="form form--two-cols" id="company-form">
                <div class="form-group">
                    <label class="label" for="name">Название</label>
                    <input
                        class="input"
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Название вашей организации"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="address">Адрес</label>
                    <input
                        class="input"
                        type="text"
                        id="address"
                        name="address"
                        placeholder="Адрес регистрации организации"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="inn">ИНН</label>
                    <input
                        class="input"
                        type="text"
                        id="inn"
                        name="inn"
                        placeholder="7707083893"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="snils">СНИЛС</label>
                    <input
                        class="input"
                        type="text"
                        id="snils"
                        name="snils"
                        placeholder="12345678901"
                        required
                    >
                </div>

                <div class="buttons-row">
                    <a href="chat.html" class="button button--secondary">Пропустить</a>
                    <button class="button" type="submit">Продолжить</button>
                </div>
                <p class="form-hint" id="company-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="api-config.js"></script>
    <script src="ui-messages.js"></script>
    <script>
        (function () {
            const form = document.getElementById('company-form');
            const messageEl = document.getElementById('company-message');

            if (!form) {
                return;
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                messageEl.textContent = '';

                const formData = new FormData(form);
                // API POST /v1/company/ принимает только name, inn, snils, address
                const payload = {
                    name: (formData.get('name') || '').toString().trim(),
                    inn: (formData.get('inn') || '').toString().trim(),
                    snils: (formData.get('snils') || '').toString().trim(),
                    address: (formData.get('address') || '').toString().trim(),
                };

                if (!payload.name || !payload.inn || !payload.snils || !payload.address) {
                    messageEl.textContent = 'Заполните обязательные поля: название, адрес, ИНН, СНИЛС.';
                    return;
                }

                try {
                    const response = await fetch((window.API_BASE || 'http://localhost:8000') + '/v1/company/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        await JurBotUi.logBadResponse('POST /v1/company/', response);
                        if (response.status === 401) {
                            messageEl.textContent = 'Сессия истекла. Войдите снова.';
                            JurBotUi.logError('POST /v1/company/ 401', {
                                hint: 'Откройте страницу через тот же хост, что и API (например /ui/), не file://',
                            });
                            return;
                        }
                        JurBotUi.clearHint(messageEl);
                        return;
                    }

                    messageEl.textContent = 'Компания создана.';
                    window.location.href = 'profile.html';
                } catch (error) {
                    JurBotUi.logError('POST /v1/company/: сеть', error);
                    JurBotUi.clearHint(messageEl);
                }
            });
        })();
    </script>
</body>
</html>
