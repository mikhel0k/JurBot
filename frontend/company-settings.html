<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки организации</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <main class="page page--wide">
        <section class="form-container">
            <header class="form-header">
                <a class="back-link" href="profile.html" aria-label="Назад">
                    <img src="images/Vector.svg" alt="" class="back-icon">
                </a>
                <h1 class="form-header-title">Настройки организации</h1>
            </header>

            <form class="form form--two-cols" id="company-settings-form">
                <div class="form-group">
                    <label class="label" for="name">Название</label>
                    <input
                        class="input"
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Название вашей организации"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="address">Адрес</label>
                    <input
                        class="input"
                        type="text"
                        id="address"
                        name="address"
                        placeholder="Адрес регистрации организации"
                        required
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="inn">ИНН</label>
                    <input
                        class="input"
                        type="text"
                        id="inn"
                        name="inn"
                        placeholder="7707083893"
                        required
                        maxlength="10"
                    >
                </div>
                <div class="form-group">
                    <label class="label" for="snils">СНИЛС</label>
                    <input
                        class="input"
                        type="text"
                        id="snils"
                        name="snils"
                        placeholder="12345678901"
                        required
                        maxlength="11"
                    >
                </div>

                <div class="buttons-row">
                    <a href="profile.html" class="button button--secondary">Назад</a>
                    <button class="button" type="submit">Сохранить</button>
                </div>
                <p class="form-hint" id="company-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="api-config.js"></script>
    <script src="ui-messages.js"></script>
    <script>
        (function () {
            const form = document.getElementById('company-settings-form');
            const messageEl = document.getElementById('company-message');
            const base = window.API_BASE || 'http://localhost:8000';

            if (!form) return;

            (async function loadCompany() {
                try {
                    const response = await fetch(base + '/v1/company/', { credentials: 'include' });
                    if (response.status === 401) {
                        window.location.href = 'index.html';
                        return;
                    }
                    if (response.status === 404) {
                        window.location.href = 'register-step2.html';
                        return;
                    }
                    if (!response.ok) {
                        await JurBotUi.logBadResponse('GET /v1/company/', response);
                        JurBotUi.clearHint(messageEl);
                        return;
                    }
                    const data = await response.json();
                    document.getElementById('name').value = data.name || '';
                    document.getElementById('address').value = data.address || '';
                    document.getElementById('inn').value = data.inn || '';
                    document.getElementById('snils').value = data.snils || '';
                } catch (e) {
                    JurBotUi.logError('GET /v1/company/: сеть', e);
                    JurBotUi.clearHint(messageEl);
                }
            })();

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                messageEl.textContent = '';

                const formData = new FormData(form);
                var payload = {
                    name: (formData.get('name') || '').toString().trim(),
                    inn: (formData.get('inn') || '').toString().trim(),
                    snils: (formData.get('snils') || '').toString().trim(),
                    address: (formData.get('address') || '').toString().trim(),
                };

                if (!payload.name || !payload.inn || !payload.snils || !payload.address) {
                    messageEl.textContent = 'Заполните все поля: название, адрес, ИНН, СНИЛС.';
                    return;
                }

                try {
                    const response = await fetch(base + '/v1/company/', {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        await JurBotUi.logBadResponse('PATCH /v1/company/', response);
                        JurBotUi.clearHint(messageEl);
                        return;
                    }

                    messageEl.textContent = 'Изменения сохранены.';
                    setTimeout(function () {
                        window.location.href = 'profile.html';
                    }, 600);
                } catch (error) {
                    JurBotUi.logError('PATCH /v1/company/: сеть', error);
                    JurBotUi.clearHint(messageEl);
                }
            });
        })();
    </script>
</body>
</html>
