<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войти в аккаунт</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <main class="page">
        <section class="form-container">
            <h1 class="form-title">Войти в аккаунт</h1>

            <form class="form" id="login-form">
                <label class="label" for="email">Email</label>
                <input
                    class="input"
                    type="email"
                    id="email"
                    name="email"
                    placeholder="user@example.com"
                    autocomplete="email"
                    required
                >

                <label class="label" for="password">Введите пароль</label>
                <input
                    class="input"
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Минимум 8 символов"
                    autocomplete="current-password"
                    required
                >

                <button class="button" type="submit">Продолжить</button>
                <p class="form-hint" id="login-message" aria-live="polite"></p>
            </form>

            <p class="register-text">
                Еще нет аккаунта? <a class="register-link" href="register-step1.html">Зарегестрироваться</a>
            </p>
        </section>
    </main>

    <script src="api-config.js"></script>
    <script>
        (function () {
            const form = document.getElementById('login-form');
            const messageEl = document.getElementById('login-message');

            if (!form) {
                return;
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                messageEl.textContent = '';

                const formData = new FormData(form);
                // API /v1/auth/login принимает только email и password
                const payload = {
                    email: (formData.get('email') || '').toString().trim(),
                    password: (formData.get('password') || '').toString(),
                };

                if (!payload.email || !payload.password) {
                    messageEl.textContent = 'Введите email и пароль.';
                    return;
                }

                try {
                    const response = await fetch((window.API_BASE || 'http://localhost:8000') + '/v1/auth/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        const detail = Array.isArray(errorData.detail) ? errorData.detail.map(d => d.msg || d).join('. ') : (errorData.detail || '');
                        messageEl.textContent = detail || 'Ошибка входа. Попробуйте ещё раз.';
                        return;
                    }

                    const data = await response.json().catch(() => ({}));
                    if (data && data.jti) {
                        sessionStorage.setItem('login_jti', data.jti);
                        sessionStorage.setItem('cabinet_user_email', payload.email);
                        messageEl.textContent = 'Код отправлен на email. Проверьте почту.';
                        window.location.href = 'login-confirm.html';
                    } else {
                        messageEl.textContent = 'Неожиданный ответ сервера.';
                    }
                } catch (error) {
                    console.error(error);
                    messageEl.textContent = 'Не удалось связаться с сервером.';
                }
            });
        })();
    </script>
</body>
</html>
