<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — ЮрБот</title>
    <link rel="stylesheet" href="styles1.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body class="cabinet-page">
    <div class="cabinet-shell">
        <header class="cabinet-nav">
            <a class="cabinet-nav__brand" href="main.html">
                <img src="img/logo.svg" alt="" class="cabinet-nav__logo-img" width="44" height="44">
                <span class="cabinet-nav__brand-text"><span class="cabinet-nav__brand-accent">ЮР</span>БОТ</span>
            </a>
            <nav class="cabinet-nav__actions" aria-label="Действия">
                <a class="cabinet-chat-btn" href="chat.html">Перейти в чат</a>
            </nav>
        </header>

        <section class="cabinet-overview" aria-label="Профиль и тариф">
            <div class="cabinet-overview__left">
                <div class="cabinet-user-row">
                    <div class="cabinet-avatar">
                        <img src="img/profile.svg" alt="">
                    </div>
                    <div class="cabinet-fields">
                        <div class="cabinet-field" id="org-name-display" aria-label="Название организации">Загрузка…</div>
                        <div class="cabinet-field" id="user-email-display" aria-label="Email">—</div>
                    </div>
                </div>
                <div class="cabinet-toolbar cabinet-toolbar--profile">
                    <button type="button" class="button" id="logout-btn">Выйти</button>
                    <a class="button" href="company-settings.html">Настройки</a>
                </div>
            </div>
            <div class="cabinet-overview__right">
                <div class="cabinet-tariff-card">
                    <div class="cabinet-tariff-row">
                        <span>Ваш тариф:</span>
                        <strong>Премиум</strong>
                    </div>
                    <hr>
                    <ul class="cabinet-stats">
                        <li>Всего сотрудников: <span id="stat-employees">0</span></li>
                        <li>Всего сгенерировано документов: <span id="stat-documents">0</span></li>
                    </ul>
                </div>
            </div>
        </section>

        <div class="cabinet-columns">
            <section class="cabinet-column-card" aria-labelledby="col-docs">
                <h2 class="cabinet-column-card__title" id="col-docs">Документы</h2>
                <div class="cabinet-column-card__body cabinet-column-card__body--empty" aria-hidden="true"></div>
                <a href="#" class="cabinet-column-card__link">Посмотреть весь список</a>
            </section>
            <section class="cabinet-column-card" aria-labelledby="col-employees">
                <h2 class="cabinet-column-card__title" id="col-employees">Сотрудники</h2>
                <div class="cabinet-column-card__body" id="cabinet-employees">
                    <div class="employee-list" id="employee-list" aria-live="polite"></div>
                    <p class="cabinet-empty--inline" id="employee-empty" hidden>Пока нет сотрудников</p>
                </div>
                <a class="button cabinet-add-btn" href="add-employee.html">Добавить нового сотрудника</a>
                <a href="#cabinet-employees" class="cabinet-column-card__link">Посмотреть весь список</a>
            </section>
        </div>

        <p class="cabinet-msg form-hint" id="profile-message" aria-live="polite"></p>
    </div>

    <div class="cabinet-modal" id="delete-employee-modal" hidden role="presentation">
        <div class="cabinet-modal__backdrop" data-modal-close tabindex="-1" aria-hidden="true"></div>
        <div
            class="cabinet-modal__dialog"
            role="dialog"
            aria-modal="true"
            aria-labelledby="delete-modal-title"
            aria-describedby="delete-modal-desc"
        >
            <h3 class="cabinet-modal__title" id="delete-modal-title">Удалить сотрудника?</h3>
            <p class="cabinet-modal__text" id="delete-modal-desc"></p>
            <div class="cabinet-modal__actions">
                <button type="button" class="button button--secondary" data-modal-close>Отмена</button>
                <button type="button" class="button" id="delete-modal-confirm">Удалить</button>
            </div>
        </div>
    </div>

    <script src="api-config.js"></script>
    <script src="ui-messages.js"></script>
    <script>
        (function () {
            const base = window.API_BASE || 'http://localhost:8000';
            const orgEl = document.getElementById('org-name-display');
            const emailEl = document.getElementById('user-email-display');
            const listEl = document.getElementById('employee-list');
            const emptyEl = document.getElementById('employee-empty');
            const msgEl = document.getElementById('profile-message');
            const statEmp = document.getElementById('stat-employees');
            const deleteModal = document.getElementById('delete-employee-modal');
            const deleteModalDesc = document.getElementById('delete-modal-desc');
            const deleteModalConfirm = document.getElementById('delete-modal-confirm');
            var pendingDeleteId = null;

            var savedEmail = sessionStorage.getItem('cabinet_user_email');
            if (savedEmail) {
                emailEl.textContent = savedEmail;
            }

            function redirectUnauthenticated() {
                window.location.href = 'index.html';
            }

            function redirectNoCompany() {
                window.location.href = 'register-step2.html';
            }

            async function resolveUnauthorized(response) {
                if (!response || response.status !== 401) {
                    return;
                }
                try {
                    var data = await response.clone().json();
                    var detail = (data && data.detail ? String(data.detail) : '').toLowerCase();
                    if (detail.indexOf('do not have a company') !== -1) {
                        redirectNoCompany();
                        return;
                    }
                } catch (e) {
                    // ignore parse errors and fallback to login redirect
                }
                redirectUnauthenticated();
            }

            function esc(s) {
                var d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function renderEmployees(items) {
                listEl.innerHTML = '';
                if (!items || items.length === 0) {
                    emptyEl.hidden = false;
                    statEmp.textContent = '0';
                    return;
                }
                emptyEl.hidden = true;
                statEmp.textContent = String(items.length);
                items.forEach(function (emp) {
                    var fio = [emp.last_name, emp.first_name, emp.middle_name].filter(Boolean).join(' ');
                    var card = document.createElement('article');
                    card.className = 'employee-card employee-card--profile';
                    card.innerHTML =
                        '<div class="employee-card__row">' +
                        '<div class="employee-card__name">' +
                        esc(fio || '—') +
                        '</div>' +
                        '<div class="employee-card__actions">' +
                        '<a class="button button--small button--secondary employee-card__btn" href="add-employee.html?id=' +
                        encodeURIComponent(String(emp.id)) +
                        '">Редактировать</a>' +
                        '<button type="button" class="button button--small employee-card__btn employee-card__btn--danger" data-delete-id="' +
                        esc(String(emp.id)) +
                        '">Удалить</button>' +
                        '</div></div>';
                    listEl.appendChild(card);
                });
            }

            function openDeleteModal(id, name) {
                pendingDeleteId = id;
                deleteModalDesc.textContent =
                    'Будет удалён: ' + name + '. Это действие нельзя отменить.';
                deleteModal.hidden = false;
                document.body.style.overflow = 'hidden';
                deleteModalConfirm.focus();
            }

            function closeDeleteModal() {
                pendingDeleteId = null;
                deleteModal.hidden = true;
                document.body.style.overflow = '';
            }

            listEl.addEventListener('click', function (ev) {
                var btn = ev.target.closest('[data-delete-id]');
                if (!btn) return;
                var id = parseInt(btn.getAttribute('data-delete-id'), 10);
                if (!id) return;
                var card = btn.closest('.employee-card');
                var nameEl = card && card.querySelector('.employee-card__name');
                var name = (nameEl && nameEl.textContent.trim()) || 'Сотрудник';
                openDeleteModal(id, name);
            });

            deleteModal.addEventListener('click', function (ev) {
                if (ev.target.hasAttribute('data-modal-close')) {
                    closeDeleteModal();
                }
            });

            document.addEventListener('keydown', function (ev) {
                if (ev.key === 'Escape' && !deleteModal.hidden) {
                    closeDeleteModal();
                }
            });

            deleteModalConfirm.addEventListener('click', async function () {
                if (pendingDeleteId == null) return;
                msgEl.textContent = '';
                deleteModalConfirm.disabled = true;
                try {
                    var res = await fetch(base + '/v1/employee/', {
                        method: 'DELETE',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify([pendingDeleteId]),
                    });
                    if (res.status === 401) {
                        closeDeleteModal();
                        redirectUnauthenticated();
                        return;
                    }
                    if (!res.ok) {
                        await JurBotUi.logBadResponse('DELETE /v1/employee/', res);
                        JurBotUi.clearHint(msgEl);
                        closeDeleteModal();
                        return;
                    }
                    closeDeleteModal();
                    var eRes = await fetch(base + '/v1/employee/', { credentials: 'include' });
                    if (eRes.ok) {
                        var employees = await eRes.json();
                        renderEmployees(employees);
                    } else {
                        await JurBotUi.logBadResponse('GET /v1/employee/ (после удаления)', eRes);
                    }
                } catch (e) {
                    JurBotUi.logError('DELETE /v1/employee/: сеть', e);
                    JurBotUi.clearHint(msgEl);
                    closeDeleteModal();
                } finally {
                    deleteModalConfirm.disabled = false;
                }
            });

            document.getElementById('logout-btn').addEventListener('click', async function () {
                msgEl.textContent = '';
                try {
                    await fetch(base + '/v1/auth/logout', {
                        method: 'POST',
                        credentials: 'include',
                    });
                } catch (e) {
                    console.error(e);
                }
                sessionStorage.removeItem('cabinet_user_email');
                window.location.href = 'index.html';
            });

            (async function load() {
                try {
                    var cRes = await fetch(base + '/v1/company/', { credentials: 'include' });
                    if (cRes.status === 401) {
                        redirectUnauthenticated();
                        return;
                    }
                    if (cRes.status === 404) {
                        redirectNoCompany();
                        return;
                    }
                    if (!cRes.ok) {
                        await JurBotUi.logBadResponse('GET /v1/company/', cRes);
                        orgEl.textContent = '—';
                        return;
                    }
                    var company = await cRes.json();
                    orgEl.textContent = company.name || 'Организация';

                    var eRes = await fetch(base + '/v1/employee/', { credentials: 'include' });
                    if (eRes.status === 401) {
                        await resolveUnauthorized(eRes);
                        return;
                    }
                    if (!eRes.ok) {
                        await JurBotUi.logBadResponse('GET /v1/employee/', eRes);
                        JurBotUi.clearHint(msgEl);
                        return;
                    }
                    var employees = await eRes.json();
                    renderEmployees(employees);
                } catch (err) {
                    JurBotUi.logError('profile: загрузка', err);
                    orgEl.textContent = '—';
                    JurBotUi.clearHint(msgEl);
                }
            })();
        })();
    </script>
</body>
</html>
