<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение регистрации</title>
    <link rel="stylesheet" href="styles1.css">
</head>
<body>
    <main class="page">
        <section class="form-container">
            <header class="form-header">
                <a class="back-link" href="register-step1.html" aria-label="Назад">
                    <img src="images/Vector.svg" alt="" class="back-icon">
                </a>
                <h1 class="form-header-title">Шаг 2: введите код из email</h1>
            </header>

            <form class="form" id="confirm-form">
                <label class="label" for="code">Код из письма (6 цифр)</label>
                <input
                    class="input"
                    type="text"
                    id="code"
                    name="code"
                    placeholder="123456"
                    inputmode="numeric"
                    maxlength="6"
                    pattern="[0-9]{6}"
                    autocomplete="one-time-code"
                    required
                >

                <button class="button" type="submit">Подтвердить</button>
                <p class="form-hint" id="confirm-message" aria-live="polite"></p>
            </form>
        </section>
    </main>

    <script src="api-config.js"></script>
    <script>
        (function () {
            const jti = sessionStorage.getItem('register_jti');
            if (!jti) {
                window.location.href = 'register-step1.html';
                return;
            }

            const form = document.getElementById('confirm-form');
            const messageEl = document.getElementById('confirm-message');

            if (!form) return;

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                messageEl.textContent = '';

                const code = (document.getElementById('code').value || '').toString().trim();
                if (!code || code.length !== 6) {
                    messageEl.textContent = 'Введите 6-значный код из письма.';
                    return;
                }

                const payload = { jti, code };

                try {
                    const response = await fetch((window.API_BASE || 'http://localhost:8000') + '/v1/auth/register/confirm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify(payload),
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        const detail = Array.isArray(errorData.detail) ? errorData.detail.map(d => d.msg || d).join('. ') : (errorData.detail || '');
                        messageEl.textContent = detail || 'Неверный или истёкший код. Попробуйте зарегистрироваться снова.';
                        return;
                    }

                    const data = await response.json().catch(() => ({}));
                    sessionStorage.removeItem('register_jti');

                    if (data && data.status === 'success') {
                        messageEl.textContent = 'Регистрация завершена.';
                        window.location.href = 'register-step2.html';
                    } else {
                        window.location.href = 'register-step2.html';
                    }
                } catch (error) {
                    console.error(error);
                    messageEl.textContent = 'Не удалось связаться с сервером.';
                }
            });
        })();
    </script>
</body>
</html>
